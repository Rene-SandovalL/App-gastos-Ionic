<ion-header>
  <ion-toolbar class="profile-toolbar">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/tabs/tab1" text="" color="primary"></ion-back-button>
    </ion-buttons>
    <ion-title>Mi perfil</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="blue-header">
    <div class="avatar-container">

      @if (userAvatar) {
        <img [src]="userAvatar" class="profile-image" />
      } @else {
        <div class="initials-circle">
          @if (isUploading) {
            <ion-spinner color="dark"></ion-spinner>
          } @else {
            <span>{{ userInitials }}</span>
          }
        </div>
      }

      <div class="edit-badge" (click)="fileInput.click()">
        <ion-icon name="image-outline"></ion-icon>
      </div>

      <input #fileInput type="file" accept="image/*" (change)="onFileSelected($event)" hidden>

    </div>
  </div>

  <div class="user-details ion-text-center">
    <h1 class="user-name">{{ userName }}</h1>
    <p class="user-email">{{ userEmail }}</p>
  </div>

  <ion-item button detail="true" (click)="onCreateFamily()" class="family-item">
    <ion-icon slot="start" name="people-outline" [color]="tieneFamilia"></ion-icon>
    @if (isCheckingFamilia) {
      <ion-label><ion-spinner name="dots"></ion-spinner></ion-label>
    } @else if (tieneFamilia) {
      <ion-label>Mi Familia</ion-label>
    } @else {
      <ion-label>Unirse a una familia</ion-label>
    }
  </ion-item>

  <ion-item button detail="true" (click)="onLogout()" class="logout-item">
    <ion-icon slot="start" name="log-out-outline" color="danger"></ion-icon>
    <ion-label>Cerrar sesión</ion-label>
  </ion-item>

</ion-content>
