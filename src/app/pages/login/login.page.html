<ion-content class="auth-content">
  <div class="auth-wrapper">
    <div class="logo-block">
      <ion-icon name="logo-ionic" class="logo-icon"></ion-icon>
    </div>

    <div class="form-block">
      <ion-input
        class="auth-input"
        type="email"
        inputmode="email"
        placeholder="Correo electrónico"
        [(ngModel)]="credentials.email"
      ></ion-input>

      <ion-input
        class="auth-input"
        type="password"
        placeholder="Contraseña"
        [(ngModel)]="credentials.password"
      ></ion-input>

      <ion-button expand="block" class="primary-btn" [disabled]="isLoading" (click)="onLogin()">
        @if (isLoading) {
          <ion-spinner name="crescent"></ion-spinner>
        } @else {
          Iniciar sesión
        }
      </ion-button>

      @if (errorMessage) {
        <ion-text color="danger" class="error-text">{{ errorMessage }}</ion-text>
      }
    </div>

    <div class="bottom-actions">
      <ion-button expand="block" fill="outline" class="secondary-btn" (click)="goToRegister()">
        Crear cuenta
      </ion-button>
    </div>
  </div>
</ion-content>
