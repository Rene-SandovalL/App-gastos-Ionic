<ion-content class="auth-content">
  <div class="auth-wrapper">
    <div class="logo-block">
      <ion-icon name="logo-ionic" class="logo-icon" color="primary"></ion-icon>
    </div>

    <div class="form-block">
      <ion-input
        class="auth-input"
        type="text"
        placeholder="Nombre de usuario"
        [(ngModel)]="form.username"
      ></ion-input>

      <ion-input
        class="auth-input"
        type="email"
        inputmode="email"
        placeholder="Correo electrónico"
        [(ngModel)]="form.email"
      ></ion-input>

      <ion-input
        class="auth-input"
        type="password"
        placeholder="Contraseña"
        [(ngModel)]="form.password"
      ></ion-input>

      <ion-button expand="block" class="primary-btn" [disabled]="isLoading" (click)="onRegister()">
        @if (isLoading) {
          <ion-spinner name="crescent"></ion-spinner>
        } @else {
          Crear cuenta
        }
      </ion-button>

      @if (errorMessage) {
        <ion-text color="danger" class="error-text">{{ errorMessage }}</ion-text>
      }
    </div>

    <div class="bottom-actions">
      <ion-button expand="block" fill="outline" class="secondary-btn" (click)="goToLogin()">
        Volver a iniciar sesión
      </ion-button>
    </div>
  </div>
</ion-content>
